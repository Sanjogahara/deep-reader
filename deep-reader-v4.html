<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Reader - 哲学阅读器</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-primary: #faf8f5;
            --bg-secondary: #f0ede8;
            --bg-sidebar: #1a1a1a;
            --text-primary: #1a1a1a;
            --text-secondary: #666;
            --text-sidebar: #e0e0e0;
            --accent: #8b4513;
            --accent-light: #d4a574;
            --border: #ddd;
            --hl-yellow: rgba(255, 235, 59, 0.45);
            --hl-green: rgba(76, 175, 80, 0.35);
            --hl-blue: rgba(33, 150, 243, 0.35);
            --underline-color: #8b4513;
            --wavy-color: #e91e63;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Serif SC', serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }

        .app { display: flex; height: 100vh; }

        /* ===== 侧边栏 ===== */
        .sidebar {
            width: 300px;
            background: var(--bg-sidebar);
            color: var(--text-sidebar);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: width 0.3s;
        }
        .sidebar.collapsed { width: 0; overflow: hidden; }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid #333;
            background: #111;
        }
        .sidebar-header h1 {
            font-size: 15px;
            color: var(--accent-light);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar-tabs {
            display: flex;
            border-bottom: 1px solid #333;
        }
        .sidebar-tab {
            flex: 1;
            padding: 10px;
            background: transparent;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }
        .sidebar-tab:hover { color: #fff; }
        .sidebar-tab.active {
            color: var(--accent-light);
            background: rgba(139,69,19,0.2);
            border-bottom: 2px solid var(--accent-light);
        }

        .sidebar-content {
            flex: 1;
            overflow: hidden;
            position: relative;
        }
        .sidebar-panel {
            position: absolute;
            inset: 0;
            overflow-y: auto;
            display: none;
        }
        .sidebar-panel.active { display: block; }
        .sidebar-panel::-webkit-scrollbar { width: 5px; }
        .sidebar-panel::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

        /* 书籍目录 */
        .book-group { border-bottom: 1px solid #2a2a2a; }
        .book-header {
            display: flex;
            align-items: center;
            padding: 12px 14px;
            cursor: pointer;
            gap: 8px;
            transition: background 0.2s;
        }
        .book-header:hover { background: #2a2a2a; }
        .book-header .arrow {
            font-size: 10px;
            transition: transform 0.2s;
            color: #666;
        }
        .book-header.expanded .arrow { transform: rotate(90deg); }
        .book-header .title {
            flex: 1;
            font-size: 13px;
            font-weight: 500;
        }
        /* 书签指示器 */
        .book-header .bookmark-dot {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            display: none;
        }
        .book-header.has-bookmark .bookmark-dot { display: block; }

        .book-chapters { display: none; background: #111; }
        .book-chapters.expanded { display: block; }

        .chapter-item {
            display: flex;
            align-items: center;
            padding: 9px 14px 9px 28px;
            cursor: pointer;
            font-size: 12px;
            color: #999;
            transition: all 0.2s;
            gap: 8px;
        }
        .chapter-item:hover { background: #222; color: #fff; }
        .chapter-item.active { color: var(--accent-light); background: rgba(139,69,19,0.15); }
        .chapter-item .ch-title { flex: 1; }
        .chapter-item .ch-bookmark {
            font-size: 10px;
            color: var(--accent);
            display: none;
        }
        .chapter-item.has-bookmark .ch-bookmark { display: block; }

        .chapter-item.level-2 { padding-left: 40px; }
        .chapter-item.level-3 { padding-left: 52px; font-size: 11px; }

        /* 批注列表 */
        .note-group { border-bottom: 1px solid #2a2a2a; }
        .note-group-header {
            padding: 10px 14px;
            font-size: 12px;
            color: #888;
            background: #111;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .note-group-header .arrow { font-size: 9px; transition: transform 0.2s; }
        .note-group-header.expanded .arrow { transform: rotate(90deg); }

        .note-list { display: none; }
        .note-list.expanded { display: block; }

        .note-item {
            padding: 10px 14px;
            border-bottom: 1px solid #222;
            cursor: pointer;
            transition: background 0.2s;
        }
        .note-item:hover { background: #222; }
        .note-item .note-text {
            font-size: 12px;
            line-height: 1.5;
            color: #ccc;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .note-item .note-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 6px;
            font-size: 10px;
            color: #666;
        }
        .note-item .note-type {
            padding: 2px 5px;
            border-radius: 3px;
            font-size: 9px;
        }
        .note-type.highlight { background: var(--hl-yellow); color: #333; }
        .note-type.underline { background: var(--underline-color); color: #fff; }
        .note-type.wavy { background: var(--wavy-color); color: #fff; }
        .note-type.bookmark { background: var(--accent); color: #fff; }

        .note-item .note-comment {
            margin-top: 6px;
            padding: 6px 8px;
            background: #1a1a1a;
            border-radius: 4px;
            font-size: 11px;
            color: #aaa;
            border-left: 2px solid var(--accent);
        }

        .note-item .note-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        .note-item .note-actions button {
            padding: 3px 8px;
            font-size: 10px;
            background: #333;
            border: none;
            color: #999;
            border-radius: 3px;
            cursor: pointer;
        }
        .note-item .note-actions button:hover { background: #444; color: #fff; }
        .note-item .note-actions button.delete:hover { background: #c00; }

        /* ===== 主内容 ===== */
        .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 16px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
        }
        .toolbar-group { display: flex; align-items: center; gap: 6px; }

        .btn {
            padding: 6px 10px;
            border: 1px solid var(--border);
            background: #fff;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: all 0.2s;
        }
        .btn:hover { border-color: var(--accent); }
        .btn-icon { padding: 6px 8px; }
        .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
        .btn-primary:hover { background: #7a3d10; }

        .nav-indicator {
            font-size: 11px;
            color: var(--text-secondary);
            min-width: 70px;
            text-align: center;
        }

        /* 同步状态 */
        .sync-status {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            color: var(--text-secondary);
        }
        .sync-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #22c55e;
        }
        .sync-dot.offline { background: #666; }
        .sync-dot.syncing { background: #f59e0b; animation: pulse 1s infinite; }
        @keyframes pulse { 50% { opacity: 0.5; } }

        /* 阅读区 */
        .reader-area {
            flex: 1;
            display: flex;
            background: var(--bg-secondary);
            padding: 16px;
            gap: 16px;
            overflow: hidden;
        }

        .reader-box {
            flex: 1;
            background: #fff;
            border-radius: 4px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            position: relative;
            overflow: hidden;
        }

        #reader { width: 100%; height: 100%; }

        /* ===== AI 面板 ===== */
        .ai-panel {
            width: 340px;
            background: #fff;
            border-radius: 4px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            transition: all 0.3s;
        }
        .ai-panel.collapsed { width: 0; overflow: hidden; opacity: 0; }

        .ai-header {
            padding: 10px 14px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .ai-header h3 {
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .ai-status {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #22c55e;
        }
        .ai-status.offline { background: #ef4444; }

        .selection-section {
            padding: 12px;
            background: #fffbf5;
            border-bottom: 1px solid var(--border);
        }
        .selection-section label {
            display: block;
            font-size: 10px;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 6px;
            text-transform: uppercase;
        }
        .selection-text {
            width: 100%;
            min-height: 60px;
            max-height: 100px;
            padding: 8px;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 12px;
            line-height: 1.5;
            resize: none;
            font-family: inherit;
        }
        .selection-text:focus { outline: none; border-color: var(--accent); }

        /* 标记工具 */
        .mark-tools {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 8px;
        }
        .mark-btn {
            padding: 5px 8px;
            border: 1px solid var(--border);
            background: #fff;
            border-radius: 3px;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.2s;
        }
        .mark-btn:hover { border-color: var(--accent); }
        .mark-btn.hl-y { background: var(--hl-yellow); }
        .mark-btn.hl-g { background: var(--hl-green); }
        .mark-btn.hl-b { background: var(--hl-blue); }
        .mark-btn.ul { border-bottom: 2px solid var(--underline-color); }
        .mark-btn.wv { text-decoration: underline wavy var(--wavy-color); }

        .ai-actions {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }
        .ai-actions .btn { flex: 1; justify-content: center; font-size: 11px; }

        .ai-output {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }
        .ai-output::-webkit-scrollbar { width: 4px; }
        .ai-output::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

        .ai-response { font-size: 12px; line-height: 1.7; }
        .ai-response strong { color: var(--accent); }
        .ai-placeholder { text-align: center; padding: 24px; color: #999; font-size: 12px; }
        .ai-loading { display: flex; align-items: center; gap: 8px; padding: 16px; color: #666; font-size: 12px; }
        .spinner {
            width: 16px; height: 16px;
            border: 2px solid #ddd;
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ===== 欢迎/加载 ===== */
        .welcome {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            z-index: 50;
        }
        .welcome-box { text-align: center; max-width: 360px; padding: 32px; }
        .welcome-box .logo { font-size: 40px; margin-bottom: 12px; }
        .welcome-box h2 { font-size: 20px; color: var(--accent); margin-bottom: 8px; }
        .welcome-box p { color: #888; font-size: 13px; margin-bottom: 20px; line-height: 1.5; }

        .upload-zone {
            border: 2px dashed #ddd;
            border-radius: 8px;
            padding: 28px 16px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .upload-zone:hover { border-color: var(--accent); background: #faf8f5; }
        .upload-zone svg { width: 32px; height: 32px; color: var(--accent); margin-bottom: 8px; }
        .upload-zone h3 { font-size: 13px; margin-bottom: 4px; }
        .upload-zone span { font-size: 11px; color: #999; }

        #file-input { display: none; }

        .loading-screen {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #fff;
            z-index: 40;
        }
        .loading-screen.show { display: flex; }
        .loading-screen .spinner { width: 32px; height: 32px; margin-bottom: 12px; }

        /* ===== 弹窗 ===== */
        .popup {
            position: fixed;
            background: #fff;
            border-radius: 6px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
            padding: 6px;
            z-index: 1000;
            display: none;
            gap: 3px;
        }
        .popup.show { display: flex; }
        .popup button {
            width: 28px; height: 28px;
            border: 1px solid #eee;
            background: #fff;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
        }
        .popup button:hover { background: #f5f5f5; }
        .popup button.hl-y { background: var(--hl-yellow); }
        .popup button.hl-g { background: var(--hl-green); }
        .popup button.hl-b { background: var(--hl-blue); }

        /* ===== 模态框 ===== */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        .modal.show { display: flex; }
        .modal-box {
            background: #fff;
            border-radius: 8px;
            padding: 20px;
            width: 90%;
            max-width: 420px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-box h3 {
            font-size: 15px;
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }
        .form-group { margin-bottom: 14px; }
        .form-group label {
            display: block;
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 13px;
            font-family: inherit;
        }
        .form-group input[type="range"] { padding: 0; }
        .form-group textarea { resize: vertical; min-height: 80px; }
        .form-value { text-align: right; font-size: 11px; color: #999; margin-top: 3px; }
        .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

        /* 书签模态框 */
        .bookmark-preview {
            padding: 8px;
            background: #f5f5f5;
            border-radius: 4px;
            font-size: 11px;
            color: #666;
            margin-bottom: 10px;
            max-height: 50px;
            overflow: hidden;
        }

        /* 导出选项 */
        .export-options { display: flex; flex-direction: column; gap: 8px; }
        .export-opt {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .export-opt:hover { border-color: var(--accent); background: #faf8f5; }
        .export-opt h4 { font-size: 13px; margin-bottom: 3px; }
        .export-opt p { font-size: 11px; color: #888; }
    </style>
</head>
<body>
    <div class="app">
        <!-- 侧边栏 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h1>📚 Deep Reader</h1>
            </div>
            <div class="sidebar-tabs">
                <button class="sidebar-tab active" data-tab="toc">目录</button>
                <button class="sidebar-tab" data-tab="notes">批注</button>
            </div>
            <div class="sidebar-content">
                <div class="sidebar-panel active" id="toc-panel"></div>
                <div class="sidebar-panel" id="notes-panel"></div>
            </div>
        </aside>

        <!-- 主内容 -->
        <main class="main">
            <div class="toolbar">
                <div class="toolbar-group">
                    <button class="btn btn-icon" id="toggle-sidebar">☰</button>
                    <button class="btn" id="open-file">📂 打开</button>
                    <button class="btn" id="export-btn">📤 导出</button>
                </div>
                <div class="toolbar-group">
                    <button class="btn btn-icon" id="prev-ch">←</button>
                    <span class="nav-indicator" id="nav-indicator">- / -</span>
                    <button class="btn btn-icon" id="next-ch">→</button>
                </div>
                <div class="toolbar-group">
                    <div class="sync-status">
                        <span class="sync-dot" id="sync-dot"></span>
                        <span id="sync-text">本地</span>
                    </div>
                    <button class="btn btn-icon" id="settings-btn">⚙️</button>
                    <button class="btn" id="toggle-ai">🤖</button>
                </div>
            </div>

            <div class="reader-area">
                <div class="reader-box">
                    <div id="reader"></div>
                    <div class="welcome" id="welcome">
                        <div class="welcome-box">
                            <div class="logo">📖</div>
                            <h2>Deep Reader</h2>
                            <p>哲学文本深度阅读器<br>支持批注、书签、云同步</p>
                            <div class="upload-zone" id="upload-zone">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                    <polyline points="17,8 12,3 7,8"/>
                                    <line x1="12" y1="3" x2="12" y2="15"/>
                                </svg>
                                <h3>点击或拖拽上传</h3>
                                <span>EPUB 格式</span>
                            </div>
                            <input type="file" id="file-input" accept=".epub">
                        </div>
                    </div>
                    <div class="loading-screen" id="loading">
                        <div class="spinner"></div>
                        <span id="loading-text">加载中...</span>
                    </div>
                </div>

                <!-- AI 面板 -->
                <aside class="ai-panel" id="ai-panel">
                    <div class="ai-header">
                        <h3><span class="ai-status" id="ai-status"></span>DeepSeek</h3>
                        <button class="btn btn-icon" id="close-ai" style="padding:3px 6px;">✕</button>
                    </div>
                    <div class="selection-section">
                        <label>选中文本</label>
                        <textarea class="selection-text" id="selection-text" placeholder="选中书中文字..."></textarea>
                        <div class="mark-tools">
                            <button class="mark-btn hl-y" data-action="highlight" data-color="yellow">高亮</button>
                            <button class="mark-btn hl-g" data-action="highlight" data-color="green">高亮</button>
                            <button class="mark-btn hl-b" data-action="highlight" data-color="blue">高亮</button>
                            <button class="mark-btn ul" data-action="underline">下划线</button>
                            <button class="mark-btn wv" data-action="wavy">波浪</button>
                            <button class="mark-btn" data-action="bookmark">📌 书签</button>
                        </div>
                        <div class="ai-actions">
                            <button class="btn" id="clear-sel">清空</button>
                            <button class="btn btn-primary" id="analyze-btn">🔍 分析</button>
                        </div>
                    </div>
                    <div class="ai-output" id="ai-output">
                        <div class="ai-placeholder">选中文本后添加标记或AI分析</div>
                    </div>
                </aside>
            </div>
        </main>
    </div>

    <!-- 选中弹窗 -->
    <div class="popup" id="popup">
        <button class="hl-y" data-action="highlight" data-color="yellow" title="黄色高亮">🟡</button>
        <button class="hl-g" data-action="highlight" data-color="green" title="绿色高亮">🟢</button>
        <button class="hl-b" data-action="highlight" data-color="blue" title="蓝色高亮">🔵</button>
        <button data-action="underline" title="下划线">_</button>
        <button data-action="wavy" title="波浪线">〰</button>
        <button data-action="bookmark" title="添加书签">📌</button>
        <button data-action="ai" title="AI分析">🤖</button>
    </div>

    <!-- 书签模态框 -->
    <div class="modal" id="bookmark-modal">
        <div class="modal-box">
            <h3>📌 添加书签</h3>
            <div class="bookmark-preview" id="bookmark-preview"></div>
            <div class="form-group">
                <label>书签标题</label>
                <input type="text" id="bookmark-title" placeholder="给这个位置起个名字...">
            </div>
            <div class="form-group">
                <label>笔记（可选）</label>
                <textarea id="bookmark-note" placeholder="记录你的系统性想法..."></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn" id="cancel-bookmark">取消</button>
                <button class="btn btn-primary" id="save-bookmark">保存</button>
            </div>
        </div>
    </div>

    <!-- 设置模态框 -->
    <div class="modal" id="settings-modal">
        <div class="modal-box">
            <h3>⚙️ 设置</h3>
            <div class="form-group">
                <label>字体大小</label>
                <input type="range" id="font-size" min="14" max="24" value="16">
                <div class="form-value"><span id="font-size-val">16</span>px</div>
            </div>
            <div class="form-group">
                <label>行高</label>
                <input type="range" id="line-height" min="1.4" max="2.2" step="0.1" value="1.8">
                <div class="form-value"><span id="line-height-val">1.8</span></div>
            </div>
            <div class="form-group">
                <label>Ollama API</label>
                <input type="text" id="ollama-url" value="http://localhost:11434">
            </div>
            <div class="form-group">
                <label>模型</label>
                <input type="text" id="ai-model" value="deepseek-r1:8b">
            </div>
            <div class="form-group">
                <label>同步服务器（可选）</label>
                <input type="text" id="sync-url" placeholder="http://localhost:3001">
            </div>
            <div class="modal-actions">
                <button class="btn btn-primary" id="save-settings">保存</button>
            </div>
        </div>
    </div>

    <!-- 导出模态框 -->
    <div class="modal" id="export-modal">
        <div class="modal-box">
            <h3>📤 导出</h3>
            <div class="form-group">
                <label>选择书籍</label>
                <select id="export-book">
                    <option value="all">全部</option>
                </select>
            </div>
            <div class="export-options">
                <div class="export-opt" data-fmt="pdf">
                    <h4>📄 PDF</h4>
                    <p>导出为 PDF 文档</p>
                </div>
                <div class="export-opt" data-fmt="md">
                    <h4>📝 Markdown</h4>
                    <p>导出为 Markdown</p>
                </div>
                <div class="export-opt" data-fmt="json">
                    <h4>💾 JSON</h4>
                    <p>数据备份</p>
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn" id="close-export">取消</button>
            </div>
        </div>
    </div>

    <script>
    // ===== 全局状态 =====
    let book = null, rendition = null;
    let currentHref = null;
    let bookStructure = [];
    let annotations = {}; // { bookTitle: { href: [items] } }
    let currentSelection = null;
    let bookId = null; // 用于同步标识

    const settings = {
        fontSize: 16,
        lineHeight: 1.8,
        ollamaUrl: 'http://localhost:11434',
        aiModel: 'deepseek-r1:8b',
        syncUrl: ''
    };

    // ===== DOM =====
    const $ = id => document.getElementById(id);
    const el = {
        sidebar: $('sidebar'),
        tocPanel: $('toc-panel'),
        notesPanel: $('notes-panel'),
        welcome: $('welcome'),
        loading: $('loading'),
        loadingText: $('loading-text'),
        reader: $('reader'),
        navIndicator: $('nav-indicator'),
        aiPanel: $('ai-panel'),
        aiStatus: $('ai-status'),
        selectionText: $('selection-text'),
        aiOutput: $('ai-output'),
        popup: $('popup'),
        bookmarkModal: $('bookmark-modal'),
        bookmarkPreview: $('bookmark-preview'),
        bookmarkTitle: $('bookmark-title'),
        bookmarkNote: $('bookmark-note'),
        settingsModal: $('settings-modal'),
        exportModal: $('export-modal'),
        syncDot: $('sync-dot'),
        syncText: $('sync-text')
    };

    // ===== 初始化 =====
    function init() {
        loadSettings();
        loadAnnotations();
        bindEvents();
        checkAI();
        checkSync();
    }

    function loadSettings() {
        const s = localStorage.getItem('dr_settings');
        if (s) Object.assign(settings, JSON.parse(s));
        applySettingsUI();
    }

    function saveSettings() {
        localStorage.setItem('dr_settings', JSON.stringify(settings));
    }

    function applySettingsUI() {
        $('font-size').value = settings.fontSize;
        $('font-size-val').textContent = settings.fontSize;
        $('line-height').value = settings.lineHeight;
        $('line-height-val').textContent = settings.lineHeight;
        $('ollama-url').value = settings.ollamaUrl;
        $('ai-model').value = settings.aiModel;
        $('sync-url').value = settings.syncUrl || '';
    }

    function loadAnnotations() {
        const a = localStorage.getItem('dr_annotations');
        if (a) annotations = JSON.parse(a);
    }

    function saveAnnotations() {
        localStorage.setItem('dr_annotations', JSON.stringify(annotations));
        syncToServer();
    }

    // ===== 事件 =====
    function bindEvents() {
        // 文件
        $('upload-zone').onclick = () => $('file-input').click();
        $('file-input').onchange = e => e.target.files[0] && loadBook(e.target.files[0]);
        $('open-file').onclick = () => $('file-input').click();

        // 拖拽
        $('upload-zone').ondragover = e => { e.preventDefault(); e.currentTarget.style.borderColor = 'var(--accent)'; };
        $('upload-zone').ondragleave = e => e.currentTarget.style.borderColor = '';
        $('upload-zone').ondrop = e => {
            e.preventDefault();
            e.currentTarget.style.borderColor = '';
            const f = e.dataTransfer.files[0];
            if (f?.name.endsWith('.epub')) loadBook(f);
        };

        // 导航
        $('prev-ch').onclick = () => navChapter(-1);
        $('next-ch').onclick = () => navChapter(1);
        document.onkeydown = e => {
            if (['INPUT','TEXTAREA'].includes(e.target.tagName)) return;
            if (e.key === 'ArrowLeft') navChapter(-1);
            else if (e.key === 'ArrowRight') navChapter(1);
        };

        // 面板
        $('toggle-sidebar').onclick = () => el.sidebar.classList.toggle('collapsed');
        $('toggle-ai').onclick = () => el.aiPanel.classList.toggle('collapsed');
        $('close-ai').onclick = () => el.aiPanel.classList.add('collapsed');

        // 标签页
        document.querySelectorAll('.sidebar-tab').forEach(t => {
            t.onclick = () => {
                document.querySelectorAll('.sidebar-tab').forEach(x => x.classList.remove('active'));
                document.querySelectorAll('.sidebar-panel').forEach(x => x.classList.remove('active'));
                t.classList.add('active');
                $(t.dataset.tab + '-panel').classList.add('active');
            };
        });

        // 设置
        $('settings-btn').onclick = () => el.settingsModal.classList.add('show');
        $('save-settings').onclick = () => {
            settings.fontSize = parseInt($('font-size').value);
            settings.lineHeight = parseFloat($('line-height').value);
            settings.ollamaUrl = $('ollama-url').value;
            settings.aiModel = $('ai-model').value;
            settings.syncUrl = $('sync-url').value;
            saveSettings();
            el.settingsModal.classList.remove('show');
            if (rendition) applyReaderStyle();
            checkAI();
            checkSync();
        };
        el.settingsModal.onclick = e => e.target === el.settingsModal && el.settingsModal.classList.remove('show');

        $('font-size').oninput = e => $('font-size-val').textContent = e.target.value;
        $('line-height').oninput = e => $('line-height-val').textContent = e.target.value;

        // 导出
        $('export-btn').onclick = () => {
            updateExportSelect();
            el.exportModal.classList.add('show');
        };
        $('close-export').onclick = () => el.exportModal.classList.remove('show');
        el.exportModal.onclick = e => e.target === el.exportModal && el.exportModal.classList.remove('show');
        document.querySelectorAll('.export-opt').forEach(o => {
            o.onclick = () => doExport(o.dataset.fmt);
        });

        // 标记工具
        document.querySelectorAll('.mark-btn').forEach(b => {
            b.onclick = () => handleMark(b.dataset.action, b.dataset.color);
        });
        el.popup.querySelectorAll('button').forEach(b => {
            b.onclick = () => {
                if (b.dataset.action === 'ai') {
                    el.aiPanel.classList.remove('collapsed');
                    analyze();
                } else {
                    handleMark(b.dataset.action, b.dataset.color);
                }
                hidePopup();
            };
        });

        // AI
        $('analyze-btn').onclick = analyze;
        $('clear-sel').onclick = () => el.selectionText.value = '';

        // 书签模态框
        $('cancel-bookmark').onclick = () => el.bookmarkModal.classList.remove('show');
        $('save-bookmark').onclick = saveBookmark;

        // 隐藏弹窗
        document.addEventListener('click', e => {
            if (!el.popup.contains(e.target)) hidePopup();
        });
    }

    // ===== 加载书籍 =====
    function showLoading(t) {
        el.loading.classList.add('show');
        el.loadingText.textContent = t;
    }
    function hideLoading() {
        el.loading.classList.remove('show');
    }

    async function loadBook(file) {
        try {
            el.welcome.style.display = 'none';
            showLoading('解析书籍...');

            if (book) { book.destroy(); book = null; rendition = null; }

            const buf = await file.arrayBuffer();
            book = ePub(buf);
            await book.ready;

            const meta = book.packaging.metadata;
            bookId = meta.title || file.name;
            document.title = bookId + ' - Deep Reader';

            showLoading('加载目录...');
            const nav = await book.loaded.navigation;
            await book.loaded.spine;

            bookStructure = parseStructure(nav.toc);
            renderTOC();
            updateNotesPanel();

            showLoading('渲染...');
            el.reader.innerHTML = '';

            // 使用分页模式，避免连续滚动问题
            rendition = book.renderTo(el.reader, {
                width: '100%',
                height: '100%',
                spread: 'none',
                flow: 'paginated'
            });

            rendition.themes.register('default', getStyles());
            rendition.themes.select('default');
            rendition.themes.fontSize(settings.fontSize + 'px');

            // 恢复位置
            const savedHref = localStorage.getItem('dr_pos_' + bookId);
            const serverPos = await getServerPosition();
            const startHref = serverPos || savedHref || (book.spine.items[0]?.href);

            if (startHref) {
                await rendition.display(startHref);
                currentHref = startHref;
            } else {
                await rendition.display();
            }

            // 监听
            rendition.on('relocated', loc => {
                if (loc.start?.href) {
                    currentHref = loc.start.href;
                    updateNav();
                    localStorage.setItem('dr_pos_' + bookId, currentHref);
                    savePositionToServer();
                }
            });

            rendition.on('selected', handleSelection);

            // 应用已有批注
            applyAllAnnotations();

            hideLoading();

        } catch (err) {
            console.error(err);
            hideLoading();
            alert('加载失败: ' + err.message);
            el.welcome.style.display = 'flex';
        }
    }

    function parseStructure(toc) {
        const books = [];
        toc.forEach(item => {
            if (item.subitems?.length > 0) {
                books.push({
                    title: item.label?.trim() || '(未命名)',
                    href: item.href,
                    chapters: flattenCh(item.subitems, 1)
                });
            } else {
                const label = item.label?.trim() || '';
                if (label === '总目录' || label === '封面') return;
                if (books.length === 0) {
                    books.push({ title: '目录', href: item.href, chapters: [] });
                }
                books[books.length - 1].chapters.push({
                    title: label || '(无标题)',
                    href: item.href,
                    level: 1
                });
            }
        });
        return books;
    }

    function flattenCh(items, level) {
        const res = [];
        items.forEach(item => {
            res.push({ title: item.label?.trim() || '(无标题)', href: item.href, level });
            if (item.subitems?.length) {
                res.push(...flattenCh(item.subitems, Math.min(level + 1, 3)));
            }
        });
        return res;
    }

    function getStyles() {
        return {
            'body': {
                'font-family': "'Noto Serif SC', serif !important",
                'padding': '32px 48px !important',
                'line-height': settings.lineHeight + ' !important',
                'color': '#1a1a1a !important'
            },
            'p': {
                'text-indent': '2em !important',
                'margin': '0 0 0.8em 0 !important',
                'text-align': 'justify !important'
            },
            'h1,h2,h3,h4,h5,h6': {
                'text-indent': '0 !important',
                'font-weight': '600 !important',
                'margin': '1em 0 0.5em 0 !important'
            },
            '.dr-hl-yellow': { 'background': 'rgba(255,235,59,0.45) !important' },
            '.dr-hl-green': { 'background': 'rgba(76,175,80,0.35) !important' },
            '.dr-hl-blue': { 'background': 'rgba(33,150,243,0.35) !important' },
            '.dr-underline': { 'border-bottom': '2px solid #8b4513 !important' },
            '.dr-wavy': { 'text-decoration': 'underline wavy #e91e63 !important' }
        };
    }

    function applyReaderStyle() {
        if (!rendition) return;
        rendition.themes.register('default', getStyles());
        rendition.themes.select('default');
        rendition.themes.fontSize(settings.fontSize + 'px');
    }

    // ===== 目录渲染 =====
    function renderTOC() {
        el.tocPanel.innerHTML = '';

        bookStructure.forEach((bk, idx) => {
            const group = document.createElement('div');
            group.className = 'book-group';

            const hasBookmark = hasBookmarkInBook(bk.title);

            const header = document.createElement('div');
            header.className = 'book-header' + (idx === 0 ? ' expanded' : '') + (hasBookmark ? ' has-bookmark' : '');
            header.innerHTML = `
                <span class="arrow">▶</span>
                <span class="title">${bk.title}</span>
                <span class="bookmark-dot"></span>
            `;

            const chapters = document.createElement('div');
            chapters.className = 'book-chapters' + (idx === 0 ? ' expanded' : '');

            bk.chapters.forEach(ch => {
                const hasChBm = hasBookmarkInChapter(bk.title, ch.href);
                const div = document.createElement('div');
                div.className = `chapter-item level-${ch.level}` + (hasChBm ? ' has-bookmark' : '');
                div.innerHTML = `
                    <span class="ch-title">${ch.title}</span>
                    <span class="ch-bookmark">📌</span>
                `;
                div.onclick = async () => {
                    try {
                        await rendition.display(ch.href);
                        document.querySelectorAll('.chapter-item').forEach(x => x.classList.remove('active'));
                        div.classList.add('active');
                    } catch (e) {
                        console.error(e);
                    }
                };
                chapters.appendChild(div);
            });

            header.onclick = () => {
                header.classList.toggle('expanded');
                chapters.classList.toggle('expanded');
            };

            group.appendChild(header);
            group.appendChild(chapters);
            el.tocPanel.appendChild(group);
        });
    }

    function hasBookmarkInBook(bookTitle) {
        const ba = annotations[bookTitle];
        if (!ba) return false;
        for (const items of Object.values(ba)) {
            if (items.some(i => i.type === 'bookmark')) return true;
        }
        return false;
    }

    function hasBookmarkInChapter(bookTitle, href) {
        const ba = annotations[bookTitle];
        if (!ba || !ba[href]) return false;
        return ba[href].some(i => i.type === 'bookmark');
    }

    function updateNav() {
        if (!book || !currentHref) {
            el.navIndicator.textContent = '- / -';
            return;
        }
        const idx = book.spine.items.findIndex(i => i.href === currentHref || currentHref.startsWith(i.href.split('#')[0]));
        el.navIndicator.textContent = idx >= 0 ? `${idx + 1} / ${book.spine.items.length}` : '- / -';
    }

    function navChapter(delta) {
        if (!book) return;
        const idx = book.spine.items.findIndex(i => i.href === currentHref);
        const newIdx = Math.max(0, Math.min(book.spine.items.length - 1, idx + delta));
        rendition.display(book.spine.items[newIdx].href);
    }

    // ===== 文本选择 =====
    function handleSelection(cfiRange, contents) {
        const sel = contents.window.getSelection();
        const text = sel.toString().trim();
        if (!text) return;

        currentSelection = { text, cfiRange, contents };
        el.selectionText.value = text;
        el.aiPanel.classList.remove('collapsed');

        // 显示弹窗
        const range = sel.getRangeAt(0);
        const rect = range.getBoundingClientRect();
        const iframe = el.reader.querySelector('iframe');
        const ir = iframe.getBoundingClientRect();

        showPopup(rect.left + ir.left + rect.width / 2, rect.top + ir.top - 10);
    }

    function showPopup(x, y) {
        el.popup.style.left = Math.max(10, x - 100) + 'px';
        el.popup.style.top = Math.max(10, y - 40) + 'px';
        el.popup.classList.add('show');
    }

    function hidePopup() {
        el.popup.classList.remove('show');
    }

    // ===== 标记处理 =====
    function handleMark(action, color) {
        if (!currentSelection) {
            alert('请先选中文本');
            return;
        }

        if (action === 'bookmark') {
            // 打开书签模态框
            el.bookmarkPreview.textContent = currentSelection.text.substring(0, 80) + (currentSelection.text.length > 80 ? '...' : '');
            el.bookmarkTitle.value = '';
            el.bookmarkNote.value = '';
            el.bookmarkModal.classList.add('show');
            el.bookmarkTitle.focus();
            return;
        }

        addAnnotation(action, color, '', '');
    }

    function saveBookmark() {
        const title = el.bookmarkTitle.value.trim();
        if (!title) {
            alert('请输入书签标题');
            return;
        }
        const note = el.bookmarkNote.value.trim();
        addAnnotation('bookmark', null, title, note);
        el.bookmarkModal.classList.remove('show');
    }

    function addAnnotation(type, color, title, note) {
        if (!currentSelection || !book) return;

        const bookTitle = getCurrentBookTitle();
        const href = currentHref;

        if (!annotations[bookTitle]) annotations[bookTitle] = {};
        if (!annotations[bookTitle][href]) annotations[bookTitle][href] = [];

        const anno = {
            id: Date.now().toString(),
            type,
            color,
            title,
            note,
            text: currentSelection.text,
            cfiRange: currentSelection.cfiRange,
            timestamp: new Date().toISOString()
        };

        annotations[bookTitle][href].push(anno);
        saveAnnotations();

        // 应用样式
        applyAnnotationStyle(anno);

        // 更新UI
        updateNotesPanel();
        renderTOC();

        currentSelection = null;
    }

    function getCurrentBookTitle() {
        for (const bk of bookStructure) {
            if (bk.href === currentHref || bk.chapters.some(ch => ch.href === currentHref || currentHref.includes(ch.href.split('#')[0]))) {
                return bk.title;
            }
        }
        return bookStructure[0]?.title || '未知';
    }

    function applyAnnotationStyle(anno) {
        if (!rendition) return;
        let cls = '';
        if (anno.type === 'highlight') cls = `dr-hl-${anno.color}`;
        else if (anno.type === 'underline') cls = 'dr-underline';
        else if (anno.type === 'wavy') cls = 'dr-wavy';
        else if (anno.type === 'bookmark') cls = 'dr-hl-yellow';

        if (cls && anno.cfiRange) {
            try {
                rendition.annotations.add('highlight', anno.cfiRange, {}, null, cls);
            } catch (e) {
                console.warn('无法应用批注样式:', e);
            }
        }
    }

    function applyAllAnnotations() {
        for (const [bookTitle, chapters] of Object.entries(annotations)) {
            for (const [href, items] of Object.entries(chapters)) {
                items.forEach(anno => applyAnnotationStyle(anno));
            }
        }
    }

    // ===== 批注面板 =====
    function updateNotesPanel() {
        el.notesPanel.innerHTML = '';

        let hasAny = false;

        for (const [bookTitle, chapters] of Object.entries(annotations)) {
            const allItems = [];
            for (const [href, items] of Object.entries(chapters)) {
                items.forEach(i => allItems.push({ ...i, href }));
            }
            if (!allItems.length) continue;
            hasAny = true;

            allItems.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

            const group = document.createElement('div');
            group.className = 'note-group';

            const header = document.createElement('div');
            header.className = 'note-group-header expanded';
            header.innerHTML = `<span class="arrow">▶</span>${bookTitle} (${allItems.length})`;

            const list = document.createElement('div');
            list.className = 'note-list expanded';

            allItems.forEach(item => {
                const div = document.createElement('div');
                div.className = 'note-item';

                let typeLabel = '';
                if (item.type === 'highlight') typeLabel = '<span class="note-type highlight">高亮</span>';
                else if (item.type === 'underline') typeLabel = '<span class="note-type underline">下划线</span>';
                else if (item.type === 'wavy') typeLabel = '<span class="note-type wavy">波浪线</span>';
                else if (item.type === 'bookmark') typeLabel = '<span class="note-type bookmark">📌 ' + (item.title || '书签') + '</span>';

                div.innerHTML = `
                    <div class="note-text">${item.text}</div>
                    <div class="note-meta">
                        ${typeLabel}
                        <span>${new Date(item.timestamp).toLocaleDateString()}</span>
                    </div>
                    ${item.note ? `<div class="note-comment">${item.note}</div>` : ''}
                    <div class="note-actions">
                        <button onclick="gotoNote('${bookTitle}', '${item.href}', '${item.cfiRange}')">定位</button>
                        <button class="delete" onclick="deleteNote('${bookTitle}', '${item.href}', '${item.id}')">删除</button>
                    </div>
                `;

                list.appendChild(div);
            });

            header.onclick = () => {
                header.classList.toggle('expanded');
                list.classList.toggle('expanded');
            };

            group.appendChild(header);
            group.appendChild(list);
            el.notesPanel.appendChild(group);
        }

        if (!hasAny) {
            el.notesPanel.innerHTML = '<div style="padding:20px;text-align:center;color:#666;font-size:12px;">暂无批注<br><br>选中文本后添加</div>';
        }
    }

    window.gotoNote = async function(bookTitle, href, cfiRange) {
        try {
            if (cfiRange) {
                await rendition.display(cfiRange);
            } else {
                await rendition.display(href);
            }
        } catch (e) {
            console.error(e);
        }
    };

    window.deleteNote = function(bookTitle, href, id) {
        if (!confirm('确定删除此批注？')) return;

        const items = annotations[bookTitle]?.[href];
        if (!items) return;

        const idx = items.findIndex(i => i.id === id);
        if (idx >= 0) {
            // 移除高亮样式
            const item = items[idx];
            if (item.cfiRange && rendition) {
                try {
                    rendition.annotations.remove(item.cfiRange, 'highlight');
                } catch (e) {}
            }

            items.splice(idx, 1);
            if (items.length === 0) delete annotations[bookTitle][href];
            if (Object.keys(annotations[bookTitle]).length === 0) delete annotations[bookTitle];

            saveAnnotations();
            updateNotesPanel();
            renderTOC();
        }
    };

    // ===== AI =====
    async function checkAI() {
        try {
            const r = await fetch(settings.ollamaUrl + '/api/tags', { signal: AbortSignal.timeout(2000) });
            el.aiStatus.classList.toggle('offline', !r.ok);
        } catch {
            el.aiStatus.classList.add('offline');
        }
    }

    async function analyze() {
        const text = el.selectionText.value.trim();
        if (!text) { alert('请先选中文本'); return; }

        el.aiOutput.innerHTML = '<div class="ai-loading"><div class="spinner"></div>分析中...</div>';

        const prompt = `你是精通黑格尔哲学的学者。分析以下文本：

"""
${text}
"""

简洁解读：核心概念、论证结构、通俗解释。用中文回答。`;

        try {
            const res = await fetch(settings.ollamaUrl + '/api/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ model: settings.aiModel, prompt, stream: true })
            });

            if (!res.ok) throw new Error('HTTP ' + res.status);

            const reader = res.body.getReader();
            const decoder = new TextDecoder();
            let result = '';

            el.aiOutput.innerHTML = '<div class="ai-response"></div>';
            const out = el.aiOutput.querySelector('.ai-response');

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                for (const line of decoder.decode(value).split('\n').filter(l => l.trim())) {
                    try {
                        const j = JSON.parse(line);
                        if (j.response) {
                            result += j.response;
                            out.innerHTML = formatAI(result);
                            el.aiOutput.scrollTop = el.aiOutput.scrollHeight;
                        }
                    } catch {}
                }
            }
        } catch (err) {
            el.aiOutput.innerHTML = `<div class="ai-placeholder" style="color:#c00;">失败: ${err.message}</div>`;
        }
    }

    function formatAI(t) {
        return t
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/\n\n/g, '</p><p>')
            .replace(/\n/g, '<br>');
    }

    // ===== 同步 =====
    async function checkSync() {
        if (!settings.syncUrl) {
            el.syncDot.classList.add('offline');
            el.syncText.textContent = '本地';
            return;
        }

        try {
            const r = await fetch(settings.syncUrl + '/ping', { signal: AbortSignal.timeout(2000) });
            if (r.ok) {
                el.syncDot.classList.remove('offline');
                el.syncText.textContent = '已连接';
            } else {
                throw new Error();
            }
        } catch {
            el.syncDot.classList.add('offline');
            el.syncText.textContent = '离线';
        }
    }

    async function syncToServer() {
        if (!settings.syncUrl || !bookId) return;

        el.syncDot.classList.add('syncing');

        try {
            await fetch(settings.syncUrl + '/sync', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    bookId,
                    position: currentHref,
                    annotations,
                    timestamp: Date.now()
                })
            });
            el.syncDot.classList.remove('syncing');
        } catch {
            el.syncDot.classList.remove('syncing');
        }
    }

    async function getServerPosition() {
        if (!settings.syncUrl || !bookId) return null;

        try {
            const r = await fetch(settings.syncUrl + '/position/' + encodeURIComponent(bookId));
            if (r.ok) {
                const data = await r.json();
                if (data.annotations) {
                    // 合并服务器批注（以时间戳较新者为准）
                    const serverTS = data.timestamp || 0;
                    const localTS = parseInt(localStorage.getItem('dr_sync_ts_' + bookId) || '0');
                    if (serverTS > localTS) {
                        annotations = data.annotations;
                        localStorage.setItem('dr_annotations', JSON.stringify(annotations));
                        localStorage.setItem('dr_sync_ts_' + bookId, serverTS.toString());
                    }
                }
                return data.position;
            }
        } catch {}
        return null;
    }

    async function savePositionToServer() {
        if (!settings.syncUrl || !bookId) return;

        try {
            await fetch(settings.syncUrl + '/position', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ bookId, position: currentHref, timestamp: Date.now() })
            });
        } catch {}
    }

    // ===== 导出 =====
    function updateExportSelect() {
        const sel = $('export-book');
        sel.innerHTML = '<option value="all">全部</option>';
        Object.keys(annotations).forEach(bk => {
            const opt = document.createElement('option');
            opt.value = bk;
            opt.textContent = bk;
            sel.appendChild(opt);
        });
    }

    function doExport(fmt) {
        const selected = $('export-book').value;
        let data = {};

        if (selected === 'all') data = annotations;
        else if (annotations[selected]) data[selected] = annotations[selected];

        if (!Object.keys(data).length) {
            alert('没有可导出的批注');
            return;
        }

        if (fmt === 'json') {
            download(JSON.stringify(data, null, 2), 'annotations.json', 'application/json');
        } else if (fmt === 'md') {
            download(toMarkdown(data), 'annotations.md', 'text/markdown');
        } else if (fmt === 'pdf') {
            toPDF(data);
        }

        el.exportModal.classList.remove('show');
    }

    function toMarkdown(data) {
        let md = '# 阅读批注\n\n';
        for (const [bk, chs] of Object.entries(data)) {
            md += `## 📚 ${bk}\n\n`;
            const all = [];
            for (const items of Object.values(chs)) all.push(...items);
            all.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
            all.forEach((n, i) => {
                const label = n.type === 'bookmark' ? '📌 ' + (n.title || '书签') : n.type;
                md += `### ${i + 1}. ${label}\n\n> ${n.text}\n\n`;
                if (n.note) md += `**笔记:** ${n.note}\n\n`;
                md += `*${new Date(n.timestamp).toLocaleString()}*\n\n---\n\n`;
            });
        }
        return md;
    }

    function toPDF(data) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        let y = 20;

        doc.setFontSize(18);
        doc.text('Reading Annotations', 20, y);
        y += 15;

        for (const [bk, chs] of Object.entries(data)) {
            if (y > 270) { doc.addPage(); y = 20; }
            doc.setFontSize(14);
            doc.text(bk, 20, y);
            y += 10;

            const all = [];
            for (const items of Object.values(chs)) all.push(...items);

            doc.setFontSize(10);
            all.forEach((n, i) => {
                if (y > 270) { doc.addPage(); y = 20; }
                const label = n.type === 'bookmark' ? '[Bookmark] ' + (n.title || '') : `[${n.type}]`;
                doc.text(`${i + 1}. ${label}`, 20, y);
                y += 6;

                const lines = doc.splitTextToSize(n.text, 160);
                lines.forEach(l => {
                    if (y > 280) { doc.addPage(); y = 20; }
                    doc.text(l, 25, y);
                    y += 5;
                });

                if (n.note) {
                    const nl = doc.splitTextToSize('Note: ' + n.note, 150);
                    nl.forEach(l => {
                        if (y > 280) { doc.addPage(); y = 20; }
                        doc.text(l, 30, y);
                        y += 5;
                    });
                }
                y += 5;
            });
            y += 10;
        }

        doc.save('annotations.pdf');
    }

    function download(content, name, type) {
        const blob = new Blob([content], { type });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = name;
        a.click();
        URL.revokeObjectURL(url);
    }

    // ===== 启动 =====
    init();
    </script>
</body>
