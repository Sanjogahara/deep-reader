<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deep Reader - PDF 阅读助手</title>
  
  <!-- PDF.js Library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  </script>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
    }
    
    #pdfCanvas {
      max-width: 100%;
      height: auto;
      cursor: text;
      user-select: text;
    }
    
    .pdf-container {
      background: #525659;
      padding: 20px;
      border-radius: 12px;
      overflow-y: auto;
      max-height: 80vh;
    }
    
    .selection-overlay {
      background: rgba(66, 153, 225, 0.3);
      position: absolute;
      pointer-events: none;
    }
    
    .analyzing {
      animation: pulse 1.5s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-slate-100">
  
  <!-- 顶部工具栏 -->
  <div class="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
    <div class="max-w-screen-2xl mx-auto px-4 py-3 flex items-center justify-between gap-4 flex-wrap">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-xl flex items-center justify-center">
          <span class="text-2xl">📚</span>
        </div>
        <div>
          <h1 class="text-lg font-bold text-slate-800">Deep Reader</h1>
          <p class="text-xs text-slate-500">AI 辅助 PDF 深度阅读</p>
        </div>
      </div>
      
      <div class="flex items-center gap-3 flex-wrap">
        <!-- API Key -->
        <input
          type="password"
          id="apiKey"
          placeholder="DeepSeek API Key"
          class="px-3 py-2 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 w-48"
        />
        
        <!-- 上传按钮 -->
        <label class="px-4 py-2 bg-gradient-to-r from-indigo-600 to-purple-600 text-white rounded-lg text-sm cursor-pointer hover:scale-105 transition-transform flex items-center gap-2">
          <span>📄</span>
          <span>上传 PDF</span>
          <input type="file" accept=".pdf" id="pdfInput" class="hidden" />
        </label>
        
        <!-- 阅读模式 -->
        <select id="modeSelect" class="px-3 py-2 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500">
          <option value="philosophy">🏛️ 哲学著作</option>
          <option value="academic">📄 学术文献</option>
          <option value="magazine">📰 外刊阅读</option>
        </select>
      </div>
    </div>
  </div>

  <!-- 主内容区 -->
  <div class="max-w-screen-2xl mx-auto p-4">
    <div class="grid lg:grid-cols-2 gap-4 h-[calc(100vh-120px)]">
      
      <!-- 左侧：PDF 阅读器 -->
      <div class="bg-white rounded-2xl shadow-lg overflow-hidden flex flex-col">
        <!-- PDF 控制栏 -->
        <div class="bg-slate-50 px-4 py-3 border-b border-slate-200 flex items-center justify-between">
          <div id="pdfInfo" class="text-sm text-slate-600">
            请上传 PDF 文件开始阅读
          </div>
          <div class="flex items-center gap-2">
            <button id="prevPage" class="px-3 py-1 bg-white border border-slate-300 rounded text-sm hover:bg-slate-50 disabled:opacity-50" disabled>
              ← 上一页
            </button>
            <span id="pageInfo" class="text-sm text-slate-600">-/-</span>
            <button id="nextPage" class="px-3 py-1 bg-white border border-slate-300 rounded text-sm hover:bg-slate-50 disabled:opacity-50" disabled>
              下一页 →
            </button>
          </div>
        </div>
        
        <!-- PDF 显示区域 -->
        <div class="flex-1 overflow-auto pdf-container" id="pdfContainer">
          <div id="emptyState" class="flex items-center justify-center h-full text-slate-400">
            <div class="text-center">
              <div class="text-6xl mb-4">📚</div>
              <p class="text-lg mb-2">上传 PDF 开始阅读</p>
              <p class="text-sm">支持《美学》《纯粹理性批判》等哲学著作</p>
              <p class="text-sm">以及学术论文、外刊文章</p>
            </div>
          </div>
          <canvas id="pdfCanvas" class="hidden"></canvas>
        </div>
      </div>

      <!-- 右侧：解析面板 -->
      <div class="bg-white rounded-2xl shadow-lg overflow-hidden flex flex-col">
        <div class="bg-slate-50 px-4 py-3 border-b border-slate-200">
          <h2 class="font-semibold text-slate-800">🧠 AI 深度解析</h2>
        </div>
        
        <div class="flex-1 overflow-hidden flex flex-col">
          <!-- 选中的文本 -->
          <div class="p-4 border-b border-slate-200 bg-blue-50">
            <div class="text-sm font-semibold text-slate-700 mb-2">📝 选中的文本</div>
            <div id="selectedText" class="text-sm text-slate-600 max-h-32 overflow-y-auto leading-relaxed">
              <span class="text-slate-400 italic">在 PDF 中选中文字后，会自动显示在这里</span>
            </div>
            <button
              id="analyzeBtn"
              class="mt-3 w-full px-4 py-2 bg-gradient-to-r from-indigo-600 to-purple-600 text-white rounded-lg text-sm font-semibold hover:scale-105 transition-transform disabled:opacity-50 disabled:hover:scale-100"
              disabled
            >
              🚀 开始解析
            </button>
          </div>
          
          <!-- AI 解析结果 -->
          <div class="flex-1 overflow-y-auto p-4">
            <div id="analysisResult">
              <div class="text-center text-slate-400 py-12">
                <div class="text-4xl mb-3">✨</div>
                <p class="text-sm">选中 PDF 中的文字，点击"开始解析"</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ==================== 配置 ====================
    const MODES = {
      philosophy: {
        name: '哲学著作',
        prompt: '你是一位精通德国古典哲学的教授。请用通俗易懂的现代汉语解析这段文本，拆解其逻辑结构，解释生僻术语。限制在300字以内。',
        minLength: 100
      },
      academic: {
        name: '学术文献',
        prompt: '你是一位资深学术研究员。请总结这段文献的核心论点、研究方法和主要发现。限制在300字以内。',
        minLength: 80
      },
      magazine: {
        name: '外刊阅读',
        prompt: '你是一位双语编辑。请用中文总结这段英文文本的要点，解释难词难句。限制在300字以内。',
        minLength: 50
      }
    };

    let currentMode = 'philosophy';
    let pdfDoc = null;
    let currentPage = 1;
    let selectedTextContent = '';
    
    // ==================== 初始化 ====================
    window.addEventListener('load', () => {
      // 恢复 API Key
      const savedKey = localStorage.getItem('deepseek_api_key');
      if (savedKey) {
        document.getElementById('apiKey').value = savedKey;
      }
      
      // 保存 API Key
      document.getElementById('apiKey').addEventListener('input', (e) => {
        localStorage.setItem('deepseek_api_key', e.target.value);
      });
      
      // 模式切换
      document.getElementById('modeSelect').addEventListener('change', (e) => {
        currentMode = e.target.value;
      });
      
      // PDF 上传
      document.getElementById('pdfInput').addEventListener('change', handlePDFUpload);
      
      // 翻页按钮
      document.getElementById('prevPage').addEventListener('click', () => {
        if (currentPage > 1) {
          currentPage--;
          renderPage(currentPage);
        }
      });
      
      document.getElementById('nextPage').addEventListener('click', () => {
        if (currentPage < pdfDoc.numPages) {
          currentPage++;
          renderPage(currentPage);
        }
      });
      
      // 解析按钮
      document.getElementById('analyzeBtn').addEventListener('click', analyzeText);
      
      // 文本选择监听
      document.getElementById('pdfCanvas').addEventListener('mouseup', handleTextSelection);
    });

    // ==================== PDF 处理 ====================
    async function handlePDFUpload(e) {
      const file = e.target.files[0];
      if (!file) return;
      
      const fileReader = new FileReader();
      fileReader.onload = async function() {
        const typedarray = new Uint8Array(this.result);
        
        try {
          pdfDoc = await pdfjsLib.getDocument(typedarray).promise;
          currentPage = 1;
          
          document.getElementById('emptyState').classList.add('hidden');
          document.getElementById('pdfCanvas').classList.remove('hidden');
          document.getElementById('pdfInfo').textContent = `${file.name} (共 ${pdfDoc.numPages} 页)`;
          
          renderPage(currentPage);
          updatePageControls();
        } catch (error) {
          alert('PDF 加载失败: ' + error.message);
        }
      };
      
      fileReader.readAsArrayBuffer(file);
    }

    async function renderPage(num) {
      const page = await pdfDoc.getPage(num);
      const scale = 1.5;
      const viewport = page.getViewport({ scale });
      
      const canvas = document.getElementById('pdfCanvas');
      const context = canvas.getContext('2d');
      canvas.height = viewport.height;
      canvas.width = viewport.width;
      
      const renderContext = {
        canvasContext: context,
        viewport: viewport
      };
      
      await page.render(renderContext).promise;
      updatePageControls();
    }

    function updatePageControls() {
      document.getElementById('pageInfo').textContent = `${currentPage}/${pdfDoc.numPages}`;
      document.getElementById('prevPage').disabled = currentPage === 1;
      document.getElementById('nextPage').disabled = currentPage === pdfDoc.numPages;
    }

    // ==================== 文本选择 ====================
    async function handleTextSelection() {
      if (!pdfDoc) return;
      
      const page = await pdfDoc.getPage(currentPage);
      const textContent = await page.getTextContent();
      
      const selection = window.getSelection();
      const selectedText = selection.toString().trim();
      
      if (selectedText.length >= MODES[currentMode].minLength) {
        selectedTextContent = selectedText;
        document.getElementById('selectedText').textContent = selectedText;
        document.getElementById('analyzeBtn').disabled = false;
      }
    }

    // ==================== AI 解析 ====================
    async function analyzeText() {
      const apiKey = document.getElementById('apiKey').value.trim();
      const resultDiv = document.getElementById('analysisResult');
      const analyzeBtn = document.getElementById('analyzeBtn');
      
      if (!apiKey) {
        alert('请先输入 DeepSeek API Key\n\n获取地址: https://platform.deepseek.com');
        return;
      }
      
      if (!selectedTextContent) {
        alert('请先在 PDF 中选中文字');
        return;
      }
      
      analyzeBtn.disabled = true;
      analyzeBtn.classList.add('analyzing');
      analyzeBtn.textContent = '⏳ 解析中...';
      
      resultDiv.innerHTML = '<div class="text-sm text-slate-600 analyzing">🤔 AI 正在深度思考...</div>';
      
      try {
        const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${apiKey}`
          },
          body: JSON.stringify({
            model: 'deepseek-chat',
            messages: [
              {
                role: 'system',
                content: MODES[currentMode].prompt
              },
              {
                role: 'user',
                content: selectedTextContent
              }
            ],
            stream: true
          })
        });
        
        if (!response.ok) {
          throw new Error(`API 错误: ${response.status}`);
        }
        
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let fullText = '';
        
        resultDiv.innerHTML = '';
        const resultContent = document.createElement('div');
        resultContent.className = 'text-sm leading-relaxed text-slate-700 whitespace-pre-wrap';
        resultDiv.appendChild(resultContent);
        
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          
          const chunk = decoder.decode(value);
          const lines = chunk.split('\n').filter(line => line.trim().startsWith('data:'));
          
          for (const line of lines) {
            const data = line.replace('data: ', '');
            if (data === '[DONE]') continue;
            
            try {
              const parsed = JSON.parse(data);
              const content = parsed.choices[0]?.delta?.content || '';
              fullText += content;
              resultContent.textContent = fullText;
            } catch (e) {
              // 跳过解析错误
            }
          }
        }
        
        // 添加复制按钮
        const copyBtn = document.createElement('button');
        copyBtn.textContent = '📋 复制解析结果';
        copyBtn.className = 'mt-3 px-3 py-1 bg-slate-100 hover:bg-slate-200 rounded text-xs transition-colors';
        copyBtn.onclick = () => {
          navigator.clipboard.writeText(fullText);
          copyBtn.textContent = '✅ 已复制';
          setTimeout(() => {
            copyBtn.textContent = '📋 复制解析结果';
          }, 2000);
        };
        resultDiv.appendChild(copyBtn);
        
      } catch (error) {
        resultDiv.innerHTML = `
          <div class="text-sm text-red-600">
            <strong>❌ 解析失败</strong><br><br>
            ${error.message}
          </div>
        `;
      } finally {
        analyzeBtn.disabled = false;
        analyzeBtn.classList.remove('analyzing');
        analyzeBtn.textContent = '🚀 开始解析';
      }
    }
  </script>
</body>
</html>
