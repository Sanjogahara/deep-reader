<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Deep Reader - 通用深度阅读助手</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel Standalone (编译 JSX) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    
    /* 自定义滚动条 */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    
    ::-webkit-scrollbar-track {
      background: #f1f1f1;
      border-radius: 10px;
    }
    
    ::-webkit-scrollbar-thumb {
      background: #888;
      border-radius: 10px;
    }
    
    ::-webkit-scrollbar-thumb:hover {
      background: #555;
    }

    /* PWA 安装提示样式 */
    .install-prompt {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 16px 24px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      z-index: 9999;
      display: none;
      align-items: center;
      gap: 12px;
    }

    .install-prompt.show {
      display: flex;
      animation: slideUp 0.3s ease-out;
    }

    @keyframes slideUp {
      from {
        transform: translateX(-50%) translateY(100px);
        opacity: 0;
      }
      to {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <!-- PWA 安装提示 -->
  <div id="installPrompt" class="install-prompt">
    <span>📱 添加到主屏幕，获得 App 般的体验</span>
    <button onclick="hideInstallPrompt()" style="background: rgba(255,255,255,0.2); border: none; padding: 8px 16px; border-radius: 6px; color: white; cursor: pointer;">
      知道了
    </button>
  </div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const { Book, FileText, Newspaper, Sparkles, X, Loader2 } = lucide;

    // ============= 场景配置 =============
    const READING_MODES = {
      philosophy: {
        icon: Book,
        name: '哲学著作',
        color: 'from-amber-500 to-orange-600',
        systemPrompt: '你是一位精通德国古典哲学的教授。请用通俗易懂的现代汉语解析这段文本，拆解其逻辑结构，解释生僻术语。',
        minLength: 200,
        placeholder: '粘贴《美学》《纯粹理性批判》等哲学文本...'
      },
      academic: {
        icon: FileText,
        name: '学术文献',
        color: 'from-blue-500 to-cyan-600',
        systemPrompt: '你是一位资深学术研究员。请总结这段文献的核心论点、研究方法和主要发现，指出可能的局限性。',
        minLength: 150,
        placeholder: '粘贴论文、研究报告等学术内容...'
      },
      magazine: {
        icon: Newspaper,
        name: '外刊阅读',
        color: 'from-purple-500 to-pink-600',
        systemPrompt: '你是一位双语编辑。请先用中文总结这篇英文文章的要点，然后解释其中的难词难句（标注英文原文）。',
        minLength: 100,
        placeholder: 'Paste articles from The Economist, NYT, etc...'
      }
    };

    function DeepReader() {
      const [mode, setMode] = useState('philosophy');
      const [text, setText] = useState('');
      const [selectedText, setSelectedText] = useState('');
      const [floatingButton, setFloatingButton] = useState(null);
      const [analysis, setAnalysis] = useState([]);
      const [isAnalyzing, setIsAnalyzing] = useState(false);
      const [apiKey, setApiKey] = useState(localStorage.getItem('deepseek_api_key') || '');
      
      const textAreaRef = useRef(null);
      const currentMode = READING_MODES[mode];

      // 保存 API Key 到本地
      useEffect(() => {
        if (apiKey) {
          localStorage.setItem('deepseek_api_key', apiKey);
        }
      }, [apiKey]);

      // ============= 文本选择监听 =============
      useEffect(() => {
        const handleSelection = () => {
          const selection = window.getSelection();
          const selectedStr = selection.toString().trim();
          
          if (selectedStr.length >= currentMode.minLength) {
            const range = selection.getRangeAt(0);
            const rect = range.getBoundingClientRect();
            
            setSelectedText(selectedStr);
            setFloatingButton({
              top: rect.top + window.scrollY - 50,
              left: rect.left + rect.width / 2 - 60
            });
          } else {
            setFloatingButton(null);
          }
        };

        const handleClickOutside = (e) => {
          if (floatingButton && !e.target.closest('.floating-analyze-btn')) {
            setFloatingButton(null);
          }
        };

        document.addEventListener('mouseup', handleSelection);
        document.addEventListener('touchend', handleSelection);
        document.addEventListener('click', handleClickOutside);
        
        return () => {
          document.removeEventListener('mouseup', handleSelection);
          document.removeEventListener('touchend', handleSelection);
          document.removeEventListener('click', handleClickOutside);
        };
      }, [currentMode.minLength, floatingButton]);

      // ============= AI 解析核心逻辑 =============
      const analyzeText = async (textToAnalyze) => {
        if (!apiKey) {
          alert('请先在右上角设置 DeepSeek API Key\n\n获取地址: https://platform.deepseek.com');
          return;
        }

        setIsAnalyzing(true);
        setFloatingButton(null);
        
        const analysisId = Date.now();
        setAnalysis(prev => [{
          id: analysisId,
          query: textToAnalyze.slice(0, 80) + '...',
          result: '',
          mode: mode
        }, ...prev]);

        try {
          const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${apiKey}`
            },
            body: JSON.stringify({
              model: 'deepseek-chat',
              messages: [
                { role: 'system', content: currentMode.systemPrompt },
                { role: 'user', content: textToAnalyze }
              ],
              stream: true
            })
          });

          const reader = response.body.getReader();
          const decoder = new TextDecoder();
          let fullText = '';

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            const chunk = decoder.decode(value);
            const lines = chunk.split('\n').filter(line => line.trim().startsWith('data:'));
            
            for (const line of lines) {
              const data = line.replace('data: ', '');
              if (data === '[DONE]') continue;
              
              try {
                const parsed = JSON.parse(data);
                const content = parsed.choices[0]?.delta?.content || '';
                fullText += content;
                
                setAnalysis(prev => prev.map(item => 
                  item.id === analysisId 
                    ? { ...item, result: fullText }
                    : item
                ));
              } catch (e) {
                // 跳过解析错误的行
              }
            }
          }
        } catch (error) {
          setAnalysis(prev => prev.map(item => 
            item.id === analysisId 
              ? { ...item, result: `❌ 解析失败: ${error.message}\n\n请检查：\n1. API Key 是否正确\n2. 网络连接是否正常\n3. DeepSeek 账户余额是否充足` }
              : item
          ));
        } finally {
          setIsAnalyzing(false);
        }
      };

      // ============= 文件上传处理 =============
      const handleFileUpload = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        if (file.type === 'text/plain') {
          const text = await file.text();
          setText(text);
        } else {
          alert('当前仅支持 .txt 文件\nPDF 功能开发中...');
        }
      };

      return (
        <div className="min-h-screen bg-gradient-to-br from-slate-50 to-slate-100">
          {/* ========== 顶部导航栏 ========== */}
          <nav className="bg-white/80 backdrop-blur-lg border-b border-slate-200 sticky top-0 z-50">
            <div className="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between flex-wrap gap-3">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-xl flex items-center justify-center">
                  <Sparkles className="w-6 h-6 text-white" />
                </div>
                <h1 className="text-xl font-bold bg-gradient-to-r from-slate-800 to-slate-600 bg-clip-text text-transparent">
                  Deep Reader
                </h1>
              </div>

              <input
                type="password"
                placeholder="DeepSeek API Key"
                value={apiKey}
                onChange={(e) => setApiKey(e.target.value)}
                className="px-4 py-2 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:border-transparent w-full sm:w-auto"
              />
            </div>
          </nav>

          {/* ========== 模式选择器 ========== */}
          <div className="max-w-7xl mx-auto px-4 py-6">
            <div className="grid grid-cols-3 gap-3 mb-6">
              {Object.entries(READING_MODES).map(([key, config]) => {
                const Icon = config.icon;
                return (
                  <button
                    key={key}
                    onClick={() => setMode(key)}
                    className={`p-4 rounded-xl border-2 transition-all ${
                      mode === key 
                        ? `bg-gradient-to-r ${config.color} text-white border-transparent shadow-lg scale-105`
                        : 'bg-white border-slate-200 text-slate-700 hover:border-slate-300'
                    }`}
                  >
                    <Icon className="w-6 h-6 mx-auto mb-2" />
                    <div className="text-sm font-semibold">{config.name}</div>
                  </button>
                );
              })}
            </div>

            {/* ========== 主内容区 ========== */}
            <div className="grid lg:grid-cols-2 gap-6">
              {/* 左侧：文本输入区 */}
              <div className="bg-white rounded-2xl shadow-lg p-6 relative">
                <div className="flex items-center justify-between mb-4">
                  <h2 className="text-lg font-semibold text-slate-800">原文</h2>
                  <label className="px-4 py-2 bg-slate-100 hover:bg-slate-200 rounded-lg text-sm cursor-pointer transition-colors">
                    📁 上传文件
                    <input
                      type="file"
                      onChange={handleFileUpload}
                      accept=".txt"
                      className="hidden"
                    />
                  </label>
                </div>

                <textarea
                  ref={textAreaRef}
                  value={text}
                  onChange={(e) => setText(e.target.value)}
                  placeholder={currentMode.placeholder}
                  className="w-full h-[500px] sm:h-[600px] p-4 border border-slate-200 rounded-xl resize-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent text-base leading-relaxed"
                  style={{ fontFamily: '"Songti SC", "Georgia", serif' }}
                />

                <div className="mt-3 text-sm text-slate-500">
                  💡 选中至少 {currentMode.minLength} 字的文本，点击浮动按钮即可解析
                </div>
              </div>

              {/* 右侧：解析结果区 */}
              <div className="bg-white rounded-2xl shadow-lg p-6">
                <h2 className="text-lg font-semibold text-slate-800 mb-4 flex items-center gap-2">
                  <Sparkles className="w-5 h-5" />
                  深度解析
                </h2>

                {isAnalyzing && (
                  <div className="flex items-center gap-3 p-4 bg-blue-50 rounded-lg mb-4">
                    <Loader2 className="w-5 h-5 animate-spin text-blue-600" />
                    <span className="text-sm text-blue-700">AI 正在深度思考中...</span>
                  </div>
                )}

                <div className="space-y-4 overflow-y-auto" style={{ maxHeight: '600px' }}>
                  {analysis.length === 0 ? (
                    <div className="text-center py-20 text-slate-400">
                      <Sparkles className="w-16 h-16 mx-auto mb-4 opacity-30" />
                      <p>选中文本开始解析</p>
                    </div>
                  ) : (
                    analysis.map((item) => (
                      <div key={item.id} className="border border-slate-200 rounded-xl p-4">
                        <div className="flex items-start justify-between mb-2">
                          <div className={`text-xs px-2 py-1 rounded-full bg-gradient-to-r ${READING_MODES[item.mode].color} text-white`}>
                            {READING_MODES[item.mode].name}
                          </div>
                          <button
                            onClick={() => setAnalysis(prev => prev.filter(a => a.id !== item.id))}
                            className="text-slate-400 hover:text-slate-600"
                          >
                            <X className="w-4 h-4" />
                          </button>
                        </div>
                        <div className="text-xs text-slate-500 mb-3 italic">"{item.query}"</div>
                        <div className="text-sm leading-relaxed text-slate-700 whitespace-pre-wrap">
                          {item.result || '解析中...'}
                        </div>
                      </div>
                    ))
                  )}
                </div>
              </div>
            </div>
          </div>

          {/* ========== 浮动解析按钮 ========== */}
          {floatingButton && (
            <button
              onClick={() => analyzeText(selectedText)}
              className={`floating-analyze-btn fixed px-4 py-2 bg-gradient-to-r ${currentMode.color} text-white rounded-lg shadow-xl flex items-center gap-2 hover:scale-105 transition-transform`}
              style={{
                top: `${floatingButton.top}px`,
                left: `${floatingButton.left}px`,
                zIndex: 1000
              }}
            >
              <Sparkles className="w-4 h-4" />
              立即解析
            </button>
          )}
        </div>
      );
    }

    // 渲染应用
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<DeepReader />);

    // 初始化 Lucide 图标
    lucide.createIcons();
  </script>

  <!-- PWA Service Worker 注册 -->
  <script>
    // 检测是否在 iOS Safari 并且没有安装 PWA
    function showInstallPrompt() {
      const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
      const isInStandaloneMode = window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches;
      
      if (isIOS && !isInStandaloneMode) {
        const prompt = document.getElementById('installPrompt');
        setTimeout(() => {
          prompt.classList.add('show');
        }, 3000);
      }
    }

    function hideInstallPrompt() {
      document.getElementById('installPrompt').classList.remove('show');
    }

    window.addEventListener('load', showInstallPrompt);

    // 注册 Service Worker（用于离线支持）
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {
        console.log('Service Worker 未启用');
      });
    }
  </script>
</body>
</html>
