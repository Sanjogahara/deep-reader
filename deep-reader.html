<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Reader - 哲学阅读器</title>
    
    <!-- EPUB.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
    
    <!-- Google Fonts - 优雅的中文阅读字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Source+Han+Serif+CN:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-primary: #faf8f5;
            --bg-secondary: #f5f2ed;
            --bg-sidebar: #2c2c2c;
            --text-primary: #1a1a1a;
            --text-secondary: #666;
            --text-sidebar: #e8e6e3;
            --accent: #8b4513;
            --accent-light: #d4a574;
            --border: #e0dcd5;
            --highlight: #fff3cd;
            --shadow: rgba(0, 0, 0, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Serif SC', 'Source Han Serif CN', serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow: hidden;
        }

        /* ==================== 主布局 ==================== */
        .app-container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* ==================== 侧边栏 - 目录 ==================== */
        .sidebar {
            width: 320px;
            min-width: 320px;
            background: var(--bg-sidebar);
            color: var(--text-sidebar);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease, width 0.3s ease;
            position: relative;
            z-index: 100;
        }

        .sidebar.collapsed {
            width: 0;
            min-width: 0;
            transform: translateX(-320px);
        }

        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.2);
        }

        .sidebar-header h1 {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 2px;
            margin-bottom: 8px;
            color: var(--accent-light);
        }

        .sidebar-header .subtitle {
            font-size: 12px;
            opacity: 0.6;
        }

        .book-info {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 14px;
        }

        .book-title {
            font-weight: 600;
            margin-bottom: 4px;
            color: #fff;
        }

        .book-author {
            font-size: 12px;
            opacity: 0.7;
        }

        .toc-container {
            flex: 1;
            overflow-y: auto;
            padding: 12px 0;
        }

        .toc-container::-webkit-scrollbar {
            width: 6px;
        }

        .toc-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .toc-container::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
        }

        .toc-item {
            padding: 12px 20px;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 3px solid transparent;
            font-size: 14px;
            line-height: 1.6;
        }

        .toc-item:hover {
            background: rgba(255,255,255,0.08);
            border-left-color: var(--accent-light);
        }

        .toc-item.active {
            background: rgba(139, 69, 19, 0.3);
            border-left-color: var(--accent);
        }

        .toc-item.level-1 { padding-left: 20px; font-weight: 600; }
        .toc-item.level-2 { padding-left: 36px; font-size: 13px; }
        .toc-item.level-3 { padding-left: 52px; font-size: 12px; opacity: 0.8; }

        /* ==================== 主阅读区 ==================== */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* 顶部工具栏 */
        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 24px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            min-height: 60px;
        }

        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .toolbar-center {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toolbar-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn {
            padding: 8px 16px;
            border: 1px solid var(--border);
            background: #fff;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-primary);
        }

        .btn:hover {
            background: var(--bg-primary);
            border-color: var(--accent);
        }

        .btn-icon {
            padding: 8px 10px;
            min-width: 36px;
            justify-content: center;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .btn-primary:hover {
            background: #7a3d10;
        }

        .page-indicator {
            font-size: 13px;
            color: var(--text-secondary);
            min-width: 120px;
            text-align: center;
        }

        /* 阅读区域 */
        .reader-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            overflow: hidden;
            background: linear-gradient(180deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
            padding: 40px;
        }

        .reader-container {
            width: 100%;
            max-width: 800px;
            height: 100%;
            background: #fff;
            border-radius: 4px;
            box-shadow: 0 2px 20px var(--shadow), 0 0 1px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }

        #reader {
            width: 100%;
            height: 100%;
        }

        /* EPUB.js 内容样式覆盖 */
        .epub-container {
            padding: 48px 64px !important;
        }

        /* ==================== AI 分析面板 ==================== */
        .ai-panel {
            width: 400px;
            min-width: 400px;
            background: #fff;
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease, width 0.3s ease, opacity 0.3s ease;
            position: relative;
        }

        .ai-panel.collapsed {
            width: 0;
            min-width: 0;
            transform: translateX(400px);
            opacity: 0;
        }

        .ai-panel-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-secondary);
        }

        .ai-panel-header h3 {
            font-size: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ai-status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulse 2s infinite;
        }

        .ai-status.offline {
            background: #ef4444;
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .ai-input-section {
            padding: 16px;
            border-bottom: 1px solid var(--border);
        }

        .ai-input-section label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .ai-textarea {
            width: 100%;
            height: 120px;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            line-height: 1.6;
            resize: none;
            transition: border-color 0.2s;
        }

        .ai-textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        .ai-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .ai-actions .btn {
            flex: 1;
            justify-content: center;
        }

        .ai-output-section {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .ai-output-section::-webkit-scrollbar {
            width: 6px;
        }

        .ai-output-section::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .ai-response {
            font-size: 14px;
            line-height: 1.8;
            color: var(--text-primary);
        }

        .ai-response p {
            margin-bottom: 12px;
        }

        .ai-response h4 {
            font-size: 14px;
            font-weight: 600;
            margin: 16px 0 8px;
            color: var(--accent);
        }

        .ai-placeholder {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }

        .ai-placeholder svg {
            width: 48px;
            height: 48px;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .ai-loading {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 20px;
            color: var(--text-secondary);
        }

        .ai-loading .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ==================== 欢迎/上传界面 ==================== */
        .welcome-screen {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
            z-index: 50;
        }

        .welcome-content {
            text-align: center;
            max-width: 500px;
            padding: 40px;
        }

        .welcome-logo {
            font-size: 48px;
            margin-bottom: 24px;
        }

        .welcome-content h2 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--accent);
        }

        .welcome-content p {
            color: var(--text-secondary);
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .upload-area {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 48px 32px;
            cursor: pointer;
            transition: all 0.3s;
            background: #fff;
        }

        .upload-area:hover {
            border-color: var(--accent);
            background: var(--bg-secondary);
        }

        .upload-area svg {
            width: 48px;
            height: 48px;
            margin-bottom: 16px;
            color: var(--accent);
        }

        .upload-area h3 {
            font-size: 16px;
            margin-bottom: 8px;
        }

        .upload-area span {
            font-size: 13px;
            color: var(--text-secondary);
        }

        #file-input {
            display: none;
        }

        /* ==================== 批注弹窗 ==================== */
        .annotation-popup {
            position: fixed;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.15);
            padding: 12px;
            z-index: 1000;
            display: none;
            min-width: 200px;
        }

        .annotation-popup.show {
            display: block;
        }

        .annotation-popup button {
            display: block;
            width: 100%;
            padding: 10px 16px;
            border: none;
            background: transparent;
            cursor: pointer;
            text-align: left;
            font-size: 14px;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .annotation-popup button:hover {
            background: var(--bg-secondary);
        }

        /* ==================== 术语提示 ==================== */
        .term-tooltip {
            position: fixed;
            background: var(--bg-sidebar);
            color: #fff;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.6;
            max-width: 300px;
            z-index: 1000;
            display: none;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
        }

        .term-tooltip.show {
            display: block;
        }

        .term-tooltip .term-title {
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--accent-light);
        }

        /* ==================== 设置面板 ==================== */
        .settings-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }

        .settings-modal.show {
            display: flex;
        }

        .settings-content {
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            width: 90%;
            max-width: 480px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .settings-content h3 {
            font-size: 18px;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .setting-group {
            margin-bottom: 20px;
        }

        .setting-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-secondary);
        }

        .setting-group input[type="range"] {
            width: 100%;
        }

        .setting-group input[type="text"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
        }

        .setting-value {
            text-align: right;
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* ==================== 响应式 ==================== */
        @media (max-width: 1200px) {
            .ai-panel {
                position: fixed;
                right: 0;
                top: 0;
                bottom: 0;
                z-index: 150;
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                z-index: 150;
            }

            .reader-wrapper {
                padding: 20px;
            }

            .toolbar {
                padding: 12px 16px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 侧边栏 - 目录 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h1>📚 Deep Reader</h1>
                <div class="subtitle">哲学文本深度阅读器</div>
            </div>
            <div class="book-info" id="book-info" style="display: none;">
                <div class="book-title" id="book-title">书名</div>
                <div class="book-author" id="book-author">作者</div>
            </div>
            <nav class="toc-container" id="toc-container">
                <div style="padding: 20px; color: rgba(255,255,255,0.5); text-align: center;">
                    请先加载电子书
                </div>
            </nav>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 工具栏 -->
            <div class="toolbar">
                <div class="toolbar-left">
                    <button class="btn btn-icon" id="toggle-sidebar" title="切换目录">
                        ☰
                    </button>
                    <button class="btn" id="open-file">
                        📂 打开文件
                    </button>
                </div>
                <div class="toolbar-center">
                    <button class="btn btn-icon" id="prev-page" title="上一页">←</button>
                    <span class="page-indicator" id="page-indicator">- / -</span>
                    <button class="btn btn-icon" id="next-page" title="下一页">→</button>
                </div>
                <div class="toolbar-right">
                    <button class="btn btn-icon" id="toggle-settings" title="设置">⚙️</button>
                    <button class="btn" id="toggle-ai">
                        🤖 AI 分析
                    </button>
                </div>
            </div>

            <!-- 阅读区域 -->
            <div class="reader-wrapper">
                <div class="reader-container">
                    <div id="reader"></div>
                </div>
                
                <!-- 欢迎界面 -->
                <div class="welcome-screen" id="welcome-screen">
                    <div class="welcome-content">
                        <div class="welcome-logo">📖</div>
                        <h2>Deep Reader</h2>
                        <p>专为哲学文本设计的深度阅读器<br>支持 EPUB 格式，集成本地 AI 解析</p>
                        <div class="upload-area" id="upload-area">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                <polyline points="17,8 12,3 7,8"/>
                                <line x1="12" y1="3" x2="12" y2="15"/>
                            </svg>
                            <h3>点击或拖拽上传 EPUB 文件</h3>
                            <span>支持 .epub 格式</span>
                        </div>
                        <input type="file" id="file-input" accept=".epub">
                    </div>
                </div>
            </div>
        </main>

        <!-- AI 分析面板 -->
        <aside class="ai-panel collapsed" id="ai-panel">
            <div class="ai-panel-header">
                <h3>
                    <span class="ai-status" id="ai-status"></span>
                    DeepSeek 本地分析
                </h3>
                <button class="btn btn-icon" id="close-ai">✕</button>
            </div>
            <div class="ai-input-section">
                <label>待分析文本</label>
                <textarea class="ai-textarea" id="ai-input" placeholder="选中书中文字后点击"发送到AI"，或直接在此粘贴文本..."></textarea>
                <div class="ai-actions">
                    <button class="btn" id="clear-ai-input">清空</button>
                    <button class="btn btn-primary" id="analyze-btn">
                        🔍 开始分析
                    </button>
                </div>
            </div>
            <div class="ai-output-section" id="ai-output">
                <div class="ai-placeholder">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
                        <line x1="12" y1="17" x2="12.01" y2="17"/>
                    </svg>
                    <p>输入文本后点击分析<br>AI 将为您解读哲学概念</p>
                </div>
            </div>
        </aside>
    </div>

    <!-- 选中文本弹窗 -->
    <div class="annotation-popup" id="annotation-popup">
        <button id="send-to-ai">🤖 发送到 AI 分析</button>
        <button id="highlight-text">🖍️ 高亮标记</button>
        <button id="add-note">📝 添加批注</button>
    </div>

    <!-- 术语提示 -->
    <div class="term-tooltip" id="term-tooltip">
        <div class="term-title"></div>
        <div class="term-content"></div>
    </div>

    <!-- 设置面板 -->
    <div class="settings-modal" id="settings-modal">
        <div class="settings-content">
            <h3>阅读设置</h3>
            <div class="setting-group">
                <label>字体大小</label>
                <input type="range" id="font-size" min="14" max="28" value="18">
                <div class="setting-value"><span id="font-size-value">18</span>px</div>
            </div>
            <div class="setting-group">
                <label>行高</label>
                <input type="range" id="line-height" min="1.5" max="2.5" step="0.1" value="1.9">
                <div class="setting-value"><span id="line-height-value">1.9</span></div>
            </div>
            <div class="setting-group">
                <label>Ollama API 地址</label>
                <input type="text" id="ollama-url" value="http://localhost:11434" placeholder="http://localhost:11434">
            </div>
            <div class="setting-group">
                <label>AI 模型</label>
                <input type="text" id="ai-model" value="deepseek-r1:32b" placeholder="deepseek-r1:32b">
            </div>
            <div style="text-align: right; margin-top: 24px;">
                <button class="btn" id="close-settings">关闭</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== 全局状态 ====================
        let book = null;
        let rendition = null;
        let currentLocation = null;
        let selectedText = '';
        
        // 设置
        let settings = {
            fontSize: 18,
            lineHeight: 1.9,
            ollamaUrl: 'http://localhost:11434',
            aiModel: 'deepseek-r1:32b'
        };

        // 哲学术语库（可扩展）
        const philosophyTerms = {
            '绝对精神': '黑格尔哲学的核心概念，指精神发展的最高阶段，在此阶段精神认识到自身即是全部实在的本质。',
            '辩证法': '黑格尔的核心方法论，通过正题-反题-合题的三段式运动，揭示事物发展的内在逻辑。',
            '扬弃': '德语Aufheben，同时包含否定、保存、提升三重含义，是辩证法的关键概念。',
            '自在': '潜在的、未展开的状态，与"自为"相对。',
            '自为': '通过自我意识发展出来的状态，事物意识到自身的存在。',
            '异化': '主体与其创造物之间的对立关系，主体在客体中失去自身。',
            '现象学': '研究意识经验如何呈现的哲学方法，黑格尔的《精神现象学》是其代表作。',
            '实体': '独立存在的基础实在，黑格尔强调"实体即主体"。',
            '概念': '黑格尔逻辑学中的核心范畴，不是抽象的思维形式，而是具有自我发展能力的实在。',
            '理念': '概念与其实现的统一，是真理的最高形式。'
        };

        // ==================== DOM 元素 ====================
        const elements = {
            sidebar: document.getElementById('sidebar'),
            tocContainer: document.getElementById('toc-container'),
            bookInfo: document.getElementById('book-info'),
            bookTitle: document.getElementById('book-title'),
            bookAuthor: document.getElementById('book-author'),
            welcomeScreen: document.getElementById('welcome-screen'),
            uploadArea: document.getElementById('upload-area'),
            fileInput: document.getElementById('file-input'),
            reader: document.getElementById('reader'),
            pageIndicator: document.getElementById('page-indicator'),
            aiPanel: document.getElementById('ai-panel'),
            aiStatus: document.getElementById('ai-status'),
            aiInput: document.getElementById('ai-input'),
            aiOutput: document.getElementById('ai-output'),
            annotationPopup: document.getElementById('annotation-popup'),
            termTooltip: document.getElementById('term-tooltip'),
            settingsModal: document.getElementById('settings-modal')
        };

        // ==================== 初始化 ====================
        function init() {
            loadSettings();
            bindEvents();
            checkOllamaStatus();
        }

        function loadSettings() {
            const saved = localStorage.getItem('deepReaderSettings');
            if (saved) {
                settings = { ...settings, ...JSON.parse(saved) };
            }
            applySettings();
        }

        function saveSettings() {
            localStorage.setItem('deepReaderSettings', JSON.stringify(settings));
        }

        function applySettings() {
            document.getElementById('font-size').value = settings.fontSize;
            document.getElementById('font-size-value').textContent = settings.fontSize;
            document.getElementById('line-height').value = settings.lineHeight;
            document.getElementById('line-height-value').textContent = settings.lineHeight;
            document.getElementById('ollama-url').value = settings.ollamaUrl;
            document.getElementById('ai-model').value = settings.aiModel;

            if (rendition) {
                rendition.themes.fontSize(settings.fontSize + 'px');
                rendition.themes.override('line-height', settings.lineHeight);
            }
        }

        // ==================== 事件绑定 ====================
        function bindEvents() {
            // 文件上传
            elements.uploadArea.addEventListener('click', () => elements.fileInput.click());
            elements.fileInput.addEventListener('change', handleFileSelect);
            document.getElementById('open-file').addEventListener('click', () => elements.fileInput.click());

            // 拖拽上传
            elements.uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                elements.uploadArea.style.borderColor = '#8b4513';
            });
            elements.uploadArea.addEventListener('dragleave', () => {
                elements.uploadArea.style.borderColor = '';
            });
            elements.uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                elements.uploadArea.style.borderColor = '';
                const file = e.dataTransfer.files[0];
                if (file && file.name.endsWith('.epub')) {
                    loadBook(file);
                }
            });

            // 导航
            document.getElementById('prev-page').addEventListener('click', () => rendition?.prev());
            document.getElementById('next-page').addEventListener('click', () => rendition?.next());
            document.addEventListener('keydown', handleKeyNavigation);

            // 面板切换
            document.getElementById('toggle-sidebar').addEventListener('click', () => {
                elements.sidebar.classList.toggle('collapsed');
            });
            document.getElementById('toggle-ai').addEventListener('click', () => {
                elements.aiPanel.classList.toggle('collapsed');
            });
            document.getElementById('close-ai').addEventListener('click', () => {
                elements.aiPanel.classList.add('collapsed');
            });

            // 设置
            document.getElementById('toggle-settings').addEventListener('click', () => {
                elements.settingsModal.classList.add('show');
            });
            document.getElementById('close-settings').addEventListener('click', () => {
                elements.settingsModal.classList.remove('show');
            });
            elements.settingsModal.addEventListener('click', (e) => {
                if (e.target === elements.settingsModal) {
                    elements.settingsModal.classList.remove('show');
                }
            });

            // 设置值变化
            document.getElementById('font-size').addEventListener('input', (e) => {
                settings.fontSize = parseInt(e.target.value);
                document.getElementById('font-size-value').textContent = settings.fontSize;
                if (rendition) rendition.themes.fontSize(settings.fontSize + 'px');
                saveSettings();
            });
            document.getElementById('line-height').addEventListener('input', (e) => {
                settings.lineHeight = parseFloat(e.target.value);
                document.getElementById('line-height-value').textContent = settings.lineHeight;
                if (rendition) rendition.themes.override('line-height', settings.lineHeight);
                saveSettings();
            });
            document.getElementById('ollama-url').addEventListener('change', (e) => {
                settings.ollamaUrl = e.target.value;
                saveSettings();
                checkOllamaStatus();
            });
            document.getElementById('ai-model').addEventListener('change', (e) => {
                settings.aiModel = e.target.value;
                saveSettings();
            });

            // AI 分析
            document.getElementById('analyze-btn').addEventListener('click', analyzeText);
            document.getElementById('clear-ai-input').addEventListener('click', () => {
                elements.aiInput.value = '';
            });

            // 选中文本操作
            document.getElementById('send-to-ai').addEventListener('click', () => {
                elements.aiInput.value = selectedText;
                elements.aiPanel.classList.remove('collapsed');
                hideAnnotationPopup();
            });
            document.getElementById('highlight-text').addEventListener('click', () => {
                // TODO: 实现高亮功能
                hideAnnotationPopup();
            });
            document.getElementById('add-note').addEventListener('click', () => {
                // TODO: 实现批注功能
                hideAnnotationPopup();
            });

            // 点击空白处隐藏弹窗
            document.addEventListener('click', (e) => {
                if (!elements.annotationPopup.contains(e.target)) {
                    hideAnnotationPopup();
                }
            });
        }

        // ==================== 文件处理 ====================
        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (file) {
                loadBook(file);
            }
        }

        async function loadBook(file) {
            try {
                elements.welcomeScreen.style.display = 'none';
                elements.reader.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#666;">加载中...</div>';

                const arrayBuffer = await file.arrayBuffer();
                book = ePub(arrayBuffer);

                await book.ready;

                // 显示书籍信息
                const metadata = book.packaging.metadata;
                elements.bookTitle.textContent = metadata.title || file.name;
                elements.bookAuthor.textContent = metadata.creator || '未知作者';
                elements.bookInfo.style.display = 'block';

                // 渲染目录
                const toc = await book.loaded.navigation;
                renderTOC(toc.toc);

                // 渲染书籍
                elements.reader.innerHTML = '';
                rendition = book.renderTo(elements.reader, {
                    width: '100%',
                    height: '100%',
                    spread: 'none',
                    flow: 'paginated'
                });

                // 应用阅读样式
                rendition.themes.register('default', {
                    'body': {
                        'font-family': "'Noto Serif SC', 'Source Han Serif CN', serif !important",
                        'line-height': settings.lineHeight + ' !important',
                        'text-align': 'justify !important',
                        'padding': '0 !important'
                    },
                    'p': {
                        'text-indent': '2em !important',
                        'margin-bottom': '0.8em !important'
                    },
                    'h1, h2, h3, h4, h5, h6': {
                        'font-weight': '600 !important',
                        'margin': '1.5em 0 0.8em !important',
                        'text-indent': '0 !important'
                    },
                    'blockquote': {
                        'border-left': '3px solid #d4a574 !important',
                        'padding-left': '1em !important',
                        'margin': '1em 0 !important',
                        'color': '#666 !important',
                        'font-style': 'italic !important'
                    }
                });
                rendition.themes.select('default');
                rendition.themes.fontSize(settings.fontSize + 'px');

                // 加载保存的位置或从头开始
                const savedLocation = localStorage.getItem('deepReader_' + metadata.title);
                if (savedLocation) {
                    await rendition.display(savedLocation);
                } else {
                    await rendition.display();
                }

                // 监听位置变化
                rendition.on('locationChanged', (location) => {
                    currentLocation = location;
                    updatePageIndicator();
                    if (metadata.title) {
                        localStorage.setItem('deepReader_' + metadata.title, location.start.cfi);
                    }
                });

                // 监听文本选择
                rendition.on('selected', handleTextSelection);

                // 监听术语悬停（需要在内容加载后）
                rendition.hooks.content.register((contents) => {
                    setupTermTooltips(contents);
                });

            } catch (error) {
                console.error('加载书籍失败:', error);
                elements.reader.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#c00;">
                    加载失败: ${error.message}
                </div>`;
            }
        }

        // ==================== 目录渲染 ====================
        function renderTOC(toc, level = 1) {
            elements.tocContainer.innerHTML = '';
            
            function addItems(items, lvl) {
                items.forEach(item => {
                    const div = document.createElement('div');
                    div.className = `toc-item level-${lvl}`;
                    div.textContent = item.label.trim();
                    div.addEventListener('click', () => {
                        rendition.display(item.href);
                        document.querySelectorAll('.toc-item').forEach(el => el.classList.remove('active'));
                        div.classList.add('active');
                    });
                    elements.tocContainer.appendChild(div);

                    if (item.subitems && item.subitems.length > 0) {
                        addItems(item.subitems, Math.min(lvl + 1, 3));
                    }
                });
            }

            addItems(toc, 1);
        }

        // ==================== 页面导航 ====================
        function handleKeyNavigation(e) {
            if (!rendition) return;
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

            if (e.key === 'ArrowLeft' || e.key === 'PageUp') {
                rendition.prev();
            } else if (e.key === 'ArrowRight' || e.key === 'PageDown' || e.key === ' ') {
                rendition.next();
                e.preventDefault();
            }
        }

        function updatePageIndicator() {
            if (!book || !currentLocation) {
                elements.pageIndicator.textContent = '- / -';
                return;
            }
            
            const displayed = currentLocation.start.displayed;
            if (displayed) {
                elements.pageIndicator.textContent = `${displayed.page} / ${displayed.total}`;
            }
        }

        // ==================== 文本选择 ====================
        function handleTextSelection(cfiRange, contents) {
            const selection = contents.window.getSelection();
            selectedText = selection.toString().trim();
            
            if (selectedText.length > 0) {
                const range = selection.getRangeAt(0);
                const rect = range.getBoundingClientRect();
                
                // 获取 iframe 位置
                const iframe = elements.reader.querySelector('iframe');
                const iframeRect = iframe.getBoundingClientRect();
                
                showAnnotationPopup(
                    rect.left + iframeRect.left + rect.width / 2,
                    rect.bottom + iframeRect.top + 10
                );
            }
        }

        function showAnnotationPopup(x, y) {
            elements.annotationPopup.style.left = Math.max(10, x - 100) + 'px';
            elements.annotationPopup.style.top = y + 'px';
            elements.annotationPopup.classList.add('show');
        }

        function hideAnnotationPopup() {
            elements.annotationPopup.classList.remove('show');
        }

        // ==================== 术语提示 ====================
        function setupTermTooltips(contents) {
            const doc = contents.document;
            const body = doc.body;

            // 遍历文本节点，标记术语
            const walker = document.createTreeWalker(
                body,
                NodeFilter.SHOW_TEXT,
                null,
                false
            );

            const textNodes = [];
            while (walker.nextNode()) {
                textNodes.push(walker.currentNode);
            }

            textNodes.forEach(textNode => {
                let html = textNode.textContent;
                let hasMatch = false;

                for (const [term, definition] of Object.entries(philosophyTerms)) {
                    if (html.includes(term)) {
                        html = html.replace(
                            new RegExp(term, 'g'),
                            `<span class="philosophy-term" data-term="${term}" style="border-bottom: 1px dashed #8b4513; cursor: help;">${term}</span>`
                        );
                        hasMatch = true;
                    }
                }

                if (hasMatch) {
                    const span = doc.createElement('span');
                    span.innerHTML = html;
                    textNode.parentNode.replaceChild(span, textNode);
                }
            });

            // 添加悬停事件
            body.addEventListener('mouseover', (e) => {
                if (e.target.classList && e.target.classList.contains('philosophy-term')) {
                    const term = e.target.dataset.term;
                    const definition = philosophyTerms[term];
                    if (definition) {
                        const rect = e.target.getBoundingClientRect();
                        const iframe = elements.reader.querySelector('iframe');
                        const iframeRect = iframe.getBoundingClientRect();
                        
                        showTermTooltip(
                            term,
                            definition,
                            rect.left + iframeRect.left,
                            rect.bottom + iframeRect.top + 5
                        );
                    }
                }
            });

            body.addEventListener('mouseout', (e) => {
                if (e.target.classList && e.target.classList.contains('philosophy-term')) {
                    hideTermTooltip();
                }
            });
        }

        function showTermTooltip(term, definition, x, y) {
            elements.termTooltip.querySelector('.term-title').textContent = term;
            elements.termTooltip.querySelector('.term-content').textContent = definition;
            elements.termTooltip.style.left = x + 'px';
            elements.termTooltip.style.top = y + 'px';
            elements.termTooltip.classList.add('show');
        }

        function hideTermTooltip() {
            elements.termTooltip.classList.remove('show');
        }

        // ==================== AI 分析 ====================
        async function checkOllamaStatus() {
            try {
                const response = await fetch(settings.ollamaUrl + '/api/tags', {
                    method: 'GET',
                    mode: 'cors'
                });
                if (response.ok) {
                    elements.aiStatus.classList.remove('offline');
                    elements.aiStatus.title = 'Ollama 已连接';
                } else {
                    throw new Error('Not OK');
                }
            } catch {
                elements.aiStatus.classList.add('offline');
                elements.aiStatus.title = 'Ollama 未连接';
            }
        }

        async function analyzeText() {
            const text = elements.aiInput.value.trim();
            if (!text) {
                alert('请输入要分析的文本');
                return;
            }

            elements.aiOutput.innerHTML = `
                <div class="ai-loading">
                    <div class="spinner"></div>
                    <span>正在分析中...</span>
                </div>
            `;

            const prompt = `你是一位专业的哲学学者，精通黑格尔哲学及德国古典哲学。请对以下文本进行深入分析：

"""
${text}
"""

请从以下几个方面进行解读：
1. **核心概念**：识别文本中的关键哲学概念并解释
2. **论证结构**：分析作者的论证逻辑
3. **哲学背景**：说明这段话在黑格尔哲学体系中的位置
4. **现代诠释**：用现代语言重新阐释这段话的含义

请用中文回答，语言清晰易懂。`;

            try {
                const response = await fetch(settings.ollamaUrl + '/api/generate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: settings.aiModel,
                        prompt: prompt,
                        stream: true
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let result = '';

                elements.aiOutput.innerHTML = '<div class="ai-response"></div>';
                const responseDiv = elements.aiOutput.querySelector('.ai-response');

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n').filter(line => line.trim());

                    for (const line of lines) {
                        try {
                            const json = JSON.parse(line);
                            if (json.response) {
                                result += json.response;
                                responseDiv.innerHTML = formatAIResponse(result);
                                elements.aiOutput.scrollTop = elements.aiOutput.scrollHeight;
                            }
                        } catch {
                            // 忽略解析错误
                        }
                    }
                }

            } catch (error) {
                elements.aiOutput.innerHTML = `
                    <div class="ai-placeholder" style="color: #c00;">
                        <p>分析失败：${error.message}</p>
                        <p style="font-size: 12px; margin-top: 8px;">
                            请确保：<br>
                            1. Ollama 正在运行 (ollama serve)<br>
                            2. 已安装模型 (ollama pull ${settings.aiModel})<br>
                            3. API 地址正确
                        </p>
                    </div>
                `;
            }
        }

        function formatAIResponse(text) {
            // 简单的 Markdown 格式化
            return text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/^### (.*$)/gm, '<h4>$1</h4>')
                .replace(/^## (.*$)/gm, '<h4>$1</h4>')
                .replace(/^# (.*$)/gm, '<h4>$1</h4>')
                .replace(/^\d+\. /gm, '<br>• ')
                .replace(/\n\n/g, '</p><p>')
                .replace(/\n/g, '<br>');
        }

        // ==================== 启动 ====================
        init();
    </script>
</body>
</html>
